<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Results summary component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>
  <body>
    <main>
      <section class="section1">
        <h3 class="result">Your Result</h3>
        <h1 class="final-score">
          76
          <span class="out-of">of 100</span>
        </h1>
        <div class="greatdesc">
          <h2 class="great">Great</h2>
          <p class="description">
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </div>
      </section>
      <section class="section2">
        <h3 class="summary">Summary</h3>
        <div class="reaction">
          <div class="iconTitle">
            <img
              src="./images/icon-reaction.svg"
              alt="reaction icon"
              class="icon"
            />
            <h4 class="title">Reaction</h4>
          </div>
          <h4 class="score">80 <span>/ 100</span></h4>
        </div>
        <div class="memory">
          <div class="iconTitle">
            <img
              src="./images/icon-memory.svg"
              alt="memory icon"
              class="icon"
            />
            <h4 class="title">Memory</h4>
          </div>
          <h4 class="score">92 <span>/ 100</span></h4>
        </div>
        <div class="verbal">
          <div class="iconTitle">
            <img
              src="./images/icon-verbal.svg"
              alt="verbal icon"
              class="icon"
            />
            <h4 class="title">Verbal</h4>
          </div>
          <h4 class="score">61 <span>/ 100</span></h4>
        </div>
        <div class="visual">
          <div class="iconTitle">
            <img
              src="./images/icon-visual.svg"
              alt="visual icon"
              class="icon"
            />
            <h4 class="title">Visual</h4>
          </div>
          <h4 class="score">72 <span>/ 100</span></h4>
        </div>
        <button class="btn">Continue</button>
      </section>
    </main>

    <footer>
      <div class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by <a href="#">N. Srinu Vinay Kumar</a>.
      </div>
    </footer>
  </body>
</html>
